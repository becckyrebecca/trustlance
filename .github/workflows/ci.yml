name: LuminaHealth Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Verify Architecture & Compile Workspaces
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Verify system architecture directories
      run: npm run check:architecture

    - name: Verify workspace dependency boundaries
      run: npm run check:boundaries

    - name: Build all packages and applications
      run: npm run build
