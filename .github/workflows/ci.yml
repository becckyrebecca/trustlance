name: NovaHealth Monorepo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Verify Monorepo, Architecture & Contract Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Verify system architecture directories
      run: npm run check:architecture

    - name: Verify workspace dependency boundaries
      run: npm run check:boundaries

    - name: Build all packages and applications
      run: npm run build

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: wasm32-unknown-unknown

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Pin cargo dependencies (ed25519-dalek precise version)
      run: cargo update -p ed25519-dalek@3.0.0 --precise 2.2.0

    - name: Run contract cargo check
      run: cargo check --manifest-path contracts/nova-pay-contract/Cargo.toml

    - name: Run contract unit tests
      run: cargo test
